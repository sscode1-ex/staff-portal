<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>STAFF-PORTAL</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .top-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    padding-top: calc(20px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .staff-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .content {
    padding: 24px 20px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* NOTIFICATION BANNER */
  .notif-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .notif-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }
  .notif-desc {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }
  .notif-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    transition: opacity 0.2s;
  }
  .notif-btn:hover { opacity: 0.9; }
  .notif-btn:disabled { opacity: 0.5; }
  .notif-status {
    font-size: 12px;
    text-align: center;
    padding: 4px 0;
  }
  .notif-status.ok { color: var(--green); }
  .notif-status.err { color: #ef4444; }

  /* MESSAGES */
  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .msg-list { display: flex; flex-direction: column; gap: 12px; }
  .msg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    border-left: 3px solid var(--accent);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-card-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .msg-card-body {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .msg-card-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    opacity: 0.6;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 40px 0;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  .refresh-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    margin-top: 16px;
    transition: color 0.2s, border-color 0.2s;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--text); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">STAFF<span>-</span>PORTAL</div>
  <div class="staff-badge">{{ staff.name }}</div>
</div>

<div class="content">

  <!-- NOTIFICATION SETUP -->
  <div class="notif-banner" id="notif-banner">
    <div class="notif-title">🔔 Enable Notifications</div>
    <div class="notif-desc">Tap below to receive instant updates from management on this device.</div>
    <button class="notif-btn" id="notif-btn" onclick="enableNotifications()">Enable Notifications</button>
    <div class="notif-status" id="notif-status"></div>
  </div>

  <!-- MESSAGES -->
  <div class="section-title">Recent Messages</div>
  <div class="msg-list" id="msg-list">
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <div>No messages yet</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadMessages()">↻ Refresh</button>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCUMP5Huo3PvvFXE8_uU2-xZxduDLBPUvY",
    authDomain: "staff-portal-f9d41.firebaseapp.com",
    projectId: "staff-portal-f9d41",
    storageBucket: "staff-portal-f9d41.firebasestorage.app",
    messagingSenderId: "1033220725304",
    appId: "1:1033220725304:web:6735c3b9de88ddf1bba4cd"
  };

  const VAPID_KEY = "BDnA55njAqRzirglvglYJCbXAySRnCbaIWSUvdeoaA-gTRDHrFscsJjEfFZSzaDw8Dw_gKq95qzKw0QPpqZMgsw";
  const STAFF_TOKEN = "{{ staff.token }}";

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  // Check if already registered
  if (localStorage.getItem('fcm_registered_' + STAFF_TOKEN)) {
    document.getElementById('notif-banner').style.display = 'none';
  }

  window.enableNotifications = async function() {
    const btn = document.getElementById('notif-btn');
    const status = document.getElementById('notif-status');
    btn.disabled = true;
    btn.textContent = 'Requesting permission...';

    try {
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        status.className = 'notif-status err';
        status.textContent = '✕ Permission denied. Check your browser settings.';
        btn.disabled = false;
        btn.textContent = 'Try Again';
        return;
      }

      const reg = await navigator.serviceWorker.register('/static/firebase-messaging-sw.js');
      await navigator.serviceWorker.ready;

      const token = await getToken(messaging, {
        vapidKey: VAPID_KEY,
        serviceWorkerRegistration: reg
      });

      // Register with server
      const res = await fetch('/api/register-fcm', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token: STAFF_TOKEN, fcm_token: token })
      });

      if (res.ok) {
        status.className = 'notif-status ok';
        status.textContent = '✓ Notifications enabled!';
        btn.textContent = '✓ Enabled';
        localStorage.setItem('fcm_registered_' + STAFF_TOKEN, '1');
        setTimeout(() => {
          document.getElementById('notif-banner').style.display = 'none';
        }, 2000);
      } else {
        throw new Error('Server error');
      }

    } catch (err) {
      status.className = 'notif-status err';
      status.textContent = '✕ Error: ' + err.message;
      btn.disabled = false;
      btn.textContent = 'Try Again';
    }
  };

  // Foreground messages
  onMessage(messaging, (payload) => {
    const list = document.getElementById('msg-list');
    const card = document.createElement('div');
    card.className = 'msg-card';
    card.innerHTML = `
      <div class="msg-card-title">${payload.notification?.title || payload.data?.title || 'Update'}</div>
      <div class="msg-card-body">${payload.notification?.body || payload.data?.body || ''}</div>
      <div class="msg-card-time">Just now</div>
    `;
    // Remove empty state if present
    const empty = list.querySelector('.empty-state');
    if (empty) empty.remove();
    list.insertBefore(card, list.firstChild);
  });
</script>

<script>
const STAFF_TOKEN = "{{ staff.token }}";

async function loadMessages() {
  try {
    const res = await fetch(`/api/messages/public?token=${STAFF_TOKEN}`);
    if (!res.ok) return;
    const msgs = await res.json();
    const el = document.getElementById('msg-list');
    if (!msgs.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>No messages yet</div></div>';
      return;
    }
    el.innerHTML = msgs.map(m => `
      <div class="msg-card">
        <div class="msg-card-title">${m.title}</div>
        <div class="msg-card-body">${m.body}</div>
        <div class="msg-card-time">${formatDate(m.created_at)}</div>
      </div>
    `).join('');
  } catch(e) {}
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-AU', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

loadMessages();
</script>

</body>
</html>
